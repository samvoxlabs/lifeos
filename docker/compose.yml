version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: lifeos-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-lifeos}
      POSTGRES_USER: ${DB_USER:-lifeos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lifeos}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - lifeos-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lifeos} -d ${DB_NAME:-lifeos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lifeos-network

networks:
  lifeos-network:
    driver: bridge

volumes:
  lifeos-db-volume:
    driver: local
